<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ESP32-CAM DEMO</title>
  <style>
    body { font-family: system-ui, -apple-system, "Noto Sans TC", sans-serif; padding: 16px; }
    img { max-width: 100%; height: auto; border: 1px solid #ddd; border-radius: 8px; }
    .meta { margin-top: 8px; color: #666; font-size: 14px; }
  </style>
</head>
<body>
  <h1>最新影像</h1>
  <img id="live" src="{{ url_for('static', filename='img/detect/latest.jpg') }}?ts=0" alt="latest" />
  <div class="meta" id="meta"></div>

  <script>
    const img = document.getElementById("live");
    const meta = document.getElementById("meta");
    const base = "{{ url_for('static', filename='img/detect/latest.jpg') }}";

    function refresh() {
      const ts = Date.now();
      img.src = base + "?ts=" + ts;     // 破快取
      meta.textContent = "更新時間：" + new Date(ts).toLocaleString();
    }

    refresh();
    setInterval(refresh, 2000);
  </script>
</body>
</html>
